<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#061a40"/>
      <stop offset="100%" stop-color="#0b2c66"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1f7ae0"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <clipPath id="avatar-clip">
      <circle cx="160" cy="315" r="80"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <rect width="1200" height="630" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>

  <!-- Accent bar left -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accent)"/>

  <!-- Avatar circle -->
  <circle cx="160" cy="315" r="80" fill="#1f7ae0" opacity="0.18"/>
  <circle cx="160" cy="315" r="80" fill="none" stroke="#38bdf8" stroke-width="2.5" opacity="0.6"/>
  <text x="160" y="330" font-family="Arial,sans-serif" font-size="52" font-weight="800" fill="#ffffff" text-anchor="middle" opacity="0.9">M</text>

  <!-- Name -->
  <text x="290" y="280" font-family="Arial,sans-serif" font-size="56" font-weight="800" fill="#ffffff" letter-spacing="-1">Mohamed Mbacke</text>

  <!-- Title / subtitle -->
  <text x="292" y="334" font-family="Arial,sans-serif" font-size="26" font-weight="500" fill="#38bdf8" letter-spacing="0.5">Développement · Cybersécurité · Intelligence Artificielle</text>

  <!-- Divider -->
  <rect x="290" y="360" width="560" height="3" rx="2" fill="url(#accent)" opacity="0.5"/>

  <!-- Tags -->
  <rect x="290" y="388" width="100" height="36" rx="18" fill="#1f7ae0" fill-opacity="0.25"/>
  <text x="340" y="412" font-family="Arial,sans-serif" font-size="16" font-weight="700" fill="#38bdf8" text-anchor="middle">React</text>

  <rect x="404" y="388" width="120" height="36" rx="18" fill="#1f7ae0" fill-opacity="0.25"/>
  <text x="464" y="412" font-family="Arial,sans-serif" font-size="16" font-weight="700" fill="#38bdf8" text-anchor="middle">Supabase</text>

  <rect x="538" y="388" width="88" height="36" rx="18" fill="#1f7ae0" fill-opacity="0.25"/>
  <text x="582" y="412" font-family="Arial,sans-serif" font-size="16" font-weight="700" fill="#38bdf8" text-anchor="middle">Python</text>

  <rect x="640" y="388" width="130" height="36" rx="18" fill="#1f7ae0" fill-opacity="0.25"/>
  <text x="705" y="412" font-family="Arial,sans-serif" font-size="16" font-weight="700" fill="#38bdf8" text-anchor="middle">Cybersécurité</text>

  <rect x="784" y="388" width="88" height="36" rx="18" fill="#1f7ae0" fill-opacity="0.25"/>
  <text x="828" y="412" font-family="Arial,sans-serif" font-size="16" font-weight="700" fill="#38bdf8" text-anchor="middle">Linux</text>

  <!-- URL bottom -->
  <text x="600" y="570" font-family="Arial,sans-serif" font-size="20" fill="#dbeafe" text-anchor="middle" opacity="0.6">2mportfolio.vercel.app</text>

  <!-- Decorative circles bottom right -->
  <circle cx="1100" cy="530" r="120" fill="#1f7ae0" opacity="0.06"/>
  <circle cx="1150" cy="480" r="80" fill="#38bdf8" opacity="0.06"/>
</svg>
